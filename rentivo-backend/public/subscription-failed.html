<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Payment Failed</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f97316 0%, #ef4444 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            text-align: center;
            max-width: 420px;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .cross {
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
        h1 {
            color: #0f172a;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #475569;
            font-size: 16px;
            line-height: 1.5;
        }
        .details {
            background: #fff7ed;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #9a3412;
            text-align: left;
        }
        .details p {
            margin: 8px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">
            <div class="cross">✕</div>
        </div>
        <h1>Subscription Payment Failed</h1>
        <p>Your subscription payment could not be completed. Please return to Rentivo and try again.</p>
        <div class="details">
            <p><strong>Transaction:</strong> <span id="txn"></span></p>
            <p><strong>Plan:</strong> <span id="plan"></span></p>
            <p><strong>Status:</strong> <span id="status"></span></p>
            <p><strong>Reason:</strong> <span id="reason"></span></p>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById("txn").textContent = params.get("txn") || "N/A";
        document.getElementById("plan").textContent = params.get("plan") || "N/A";
        document.getElementById("status").textContent = params.get("status") || "Failed";
        document.getElementById("reason").textContent = params.get("reason") || "payment_failed";
    </script>
</body>
</html>
