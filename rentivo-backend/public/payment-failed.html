<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            background: #EF4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .cross {
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
        h1 {
            color: #0F172A;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #64748B;
            font-size: 16px;
            line-height: 1.5;
        }
        .details {
            background: #FEF2F2;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #991B1B;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">
            <div class="cross">✕</div>
        </div>
        <h1>Payment Failed</h1>
        <p>Your payment could not be processed. Please try again or contact support if the problem persists.</p>
        <div class="details">
            <p><strong>Status:</strong> <span id="status"></span></p>
            <p><strong>Transaction:</strong> <span id="txn"></span></p>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('status').textContent = params.get('status') || 'Failed';
        document.getElementById('txn').textContent = params.get('txn') || 'N/A';
    </script>
</body>
</html>
