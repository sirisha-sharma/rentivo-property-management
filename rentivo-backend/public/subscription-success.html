<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Activated</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            text-align: center;
            max-width: 420px;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .checkmark {
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
        h1 {
            color: #0f172a;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #475569;
            font-size: 16px;
            line-height: 1.5;
        }
        .details {
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #334155;
            text-align: left;
        }
        .details p {
            margin: 8px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <div class="checkmark">✓</div>
        </div>
        <h1>Subscription Activated</h1>
        <p>Your landlord subscription payment was successful. You can return to Rentivo and continue managing your properties.</p>
        <div class="details">
            <p><strong>Transaction:</strong> <span id="txn"></span></p>
            <p><strong>Plan:</strong> <span id="plan"></span></p>
            <p><strong>Amount:</strong> NPR <span id="amount"></span></p>
            <p><strong>Valid Until:</strong> <span id="validUntil"></span></p>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const validUntil = params.get("validUntil");

        document.getElementById("txn").textContent = params.get("txn") || "N/A";
        document.getElementById("plan").textContent = params.get("plan") || "N/A";
        document.getElementById("amount").textContent = params.get("amount") || "N/A";
        document.getElementById("validUntil").textContent = validUntil
            ? new Date(validUntil).toLocaleDateString()
            : "N/A";
    </script>
</body>
</html>
